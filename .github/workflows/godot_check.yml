name: Godot Headless Check

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Get the code
        uses: actions/checkout@v4

      # Step 2: Download Godot executable (using curl — pre-installed on ubuntu-latest)
      - name: Download Godot
        run: |
          curl -L -o godot.zip \
            https://github.com/godotengine/godot/releases/download/4.2-stable/Godot_v4.2-stable_linux.x86_64.zip
          unzip godot.zip
          ls -la

      # Step 3: Make it executable
      - name: Make Godot executable
        run: chmod +x Godot_v4.2-stable_linux.x86_64

      # Step 4: Confirm Godot starts
      - name: Confirm Godot starts
        run: ./Godot_v4.2-stable_linux.x86_64 --headless --version

